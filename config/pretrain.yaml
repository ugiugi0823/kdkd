env:
  WANDB_PROJECT: "LLM"
  WANDB_RUN_GROUP: "corpus-pretrain-gemma3"
  WANDB_WATCH: ""
  TORCH_DISTRIBUTED_DEBUG: "OFF"
  TORCHDYNAMO_VERBOSE: "1"
  TORCHDYNAMO_DISABLE: "1"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True,roundup_power2_divisions:[32:256,64:128,256:64,>:32]"
  CUDA_DEVICE_ORDER: "PCI_BUS_ID"
  OMP_NUM_THREADS: 2
  HF_TOKEN: "${HF_TOKEN}"
  WANDB_API_KEY: "${WANDB_API_KEY}"

# ─── 모델 ─────────────────────────────────────────────────────────────────────
model_name_or_path: "google/gemma-3-12b-pt"
output_dir: "/PROJECT/0325120095_A/BASE/rex/corpus/output/gemma-3-12b-pt/pretrain"

# ─── 데이터 (로컬 /xtmp/ Arrow 데이터셋) ───────────────────────────────────────
data_paths:
  - "/xtmp/jp1924_MultilingualCorpusInFinancialSector"
  - "/xtmp/ugiugi_korean_financial_corpus"

# validation split 개수 제한 (각 데이터셋)
validation_truncate: 500

# 텍스트 추출 필드 (sentence_ls → join)
text_field: "sentence_ls"
text_join_sep: "\n"

# ─── 전처리 ────────────────────────────────────────────────────────────────────
preprocessing_num_workers: 20
preprocessing_batch_size: 1000
max_length: 32768

# ─── 학습 하이퍼파라미터 ──────────────────────────────────────────────────────
per_device_train_batch_size: 2
gradient_accumulation_steps: 2
per_device_eval_batch_size: 1
eval_accumulation_steps: 32
num_train_epochs: 1

learning_rate: 2.0e-6
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0
optim: paged_adamw_32bit
max_grad_norm: 1.0

# ─── eval / save ──────────────────────────────────────────────────────────────
do_train: true
do_eval: true
do_predict: false
eval_on_start: true
eval_strategy: "steps"
eval_steps: 74
save_strategy: "steps"
save_steps: 74
save_only_model: true
torch_empty_cache_steps: 74

# ─── 최적화 ────────────────────────────────────────────────────────────────────
bf16: true
tf32: true
attn_implementation: flash_attention_2
use_liger_kernel: true
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
torch_compile: false   # DeepSpeed와 호환 문제로 기본 off
packing: true
padding_free: false    # DeepSpeed ZeRO3 환경에서는 off

# ─── DataLoader ───────────────────────────────────────────────────────────────
dataloader_prefetch_factor: 10
dataloader_num_workers: 10

# ─── Loss ────────────────────────────────────────────────────────────────────
loss_type: "nll"       # eaft: TRL SFTConfig에서 지원하는 경우 "eaft"로 변경

# ─── Logging ─────────────────────────────────────────────────────────────────
report_to: "wandb"
logging_strategy: "steps"
logging_steps: 1
run_name: "corpus-pretrain"

# ─── 기타 ────────────────────────────────────────────────────────────────────
include_num_input_tokens_seen: true
remove_unused_columns: false
ddp_timeout: 18000000
seed: 42

# ─── LoRA (PiSSA) ─────────────────────────────────────────────────────────────
use_peft: true
lora_task_type: CAUSAL_LM
lora_r: 128
lora_alpha: 256
lora_dropout: 0
lora_target_modules: "all-linear"
use_rslora: false
lora_init_weights: "pissa_niter_4"

# ─── Knowledge Distillation (Corpus KD) ───────────────────────────────────────
# false: 기존 SFTTrainer (NLL loss)
# true : CorpusKDTrainer (JSD loss, teacher 모델 필요)
use_gkd: false

gkd:
  teacher_model_path: "google/gemma-3-27b-pt"
  beta: 0.5        # 0.0=forward KL, 0.5=symmetric JSD, 1.0=reverse KL
  temperature: 1.0 # 교사 softmax 온도 (1.0=변경 없음)
